<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IWO 評価システム v3.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#1B2A4A;--navy2:#243561;--red:#C0392B;--red2:#E74C3C;--gold:#D4A017;--bg:#F4F6FB;--white:#fff;--border:#E2E6EF;--text:#1B2A4A;--sub:#6B7A99;--light:#A0AABF;--ok:#1D9E75;--ok-bg:#EAF7F2;--warn:#E67E22;--warn-bg:#FEF3E7;--danger:#C0392B;--danger-bg:#FDECEA;--info:#2980B9;--info-bg:#EBF5FB;--purple:#7F77DD;--purple-bg:#EEEDFE;--r:10px;--rs:6px;--sh:0 2px 12px rgba(27,42,74,.08);--sh2:0 8px 32px rgba(27,42,74,.14);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;}
#app{display:flex;min-height:100vh;}
#sidebar{width:230px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;}
#main{margin-left:230px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
#topbar{height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(27,42,74,.06);}
#content{flex:1;padding:26px 26px 40px;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-logo-mark{display:flex;align-items:center;gap:9px;}
.sb-icon{width:34px;height:34px;border-radius:9px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.sb-title{font-size:14px;font-weight:700;color:#fff;}.sb-ver{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px;}
.sb-user{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px;}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.sb-uname{font-size:12px;color:rgba(255,255,255,.9);font-weight:500;}.sb-urole{font-size:10px;color:rgba(255,255,255,.45);}
.sb-sec{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase;padding:16px 16px 5px;}
.sb-nav{padding:0 9px 6px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);color:rgba(255,255,255,.6);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;margin-bottom:2px;transition:all .12s;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}.nav-item.active{background:var(--red);color:#fff;}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:600;}.tb-right{display:flex;align-items:center;gap:10px;}
.q-pill{display:inline-flex;align-items:center;gap:5px;background:var(--navy);color:#fff;border-radius:99px;font-size:12px;font-weight:600;padding:5px 12px;}
.pg-hd{margin-bottom:20px;}.pg-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:2px;}.pg-sub{font-size:13px;color:var(--sub);}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:16px;overflow:hidden;}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.card-title{font-size:14px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:6px;}
.card-body{padding:16px 18px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.grid6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.stat{background:var(--white);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);border:1px solid var(--border);}
.stat-lbl{font-size:11px;color:var(--sub);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.stat-val{font-size:22px;font-weight:700;color:var(--navy);line-height:1.1;}
.stat-unit{font-size:12px;font-weight:400;color:var(--sub);margin-left:2px;}
.stat-sub{font-size:11px;color:var(--light);margin-top:4px;}
.at-navy{border-top:3px solid var(--navy);}.at-red{border-top:3px solid var(--red);}.at-gold{border-top:3px solid var(--gold);}.at-ok{border-top:3px solid var(--ok);}.at-purple{border-top:3px solid var(--purple);}.at-info{border-top:3px solid var(--info);}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap;}
.b-navy{background:var(--navy);color:#fff;}.b-red{background:var(--danger-bg);color:var(--danger);}.b-ok{background:var(--ok-bg);color:var(--ok);}.b-warn{background:var(--warn-bg);color:var(--warn);}.b-info{background:var(--info-bg);color:var(--info);}.b-gray{background:#F0F2F7;color:var(--sub);}.b-purple{background:var(--purple-bg);color:var(--purple);}.b-gold{background:#FEF9E7;color:#9A7000;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;}
.btn-navy{background:var(--navy);color:#fff;border-color:var(--navy);}.btn-navy:hover{background:var(--navy2);}
.btn-red{background:var(--red);color:#fff;border-color:var(--red);}
.btn-ok{background:var(--ok);color:#fff;border-color:var(--ok);}
.btn-warn{background:var(--warn);color:#fff;border-color:var(--warn);}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple);}.btn-purple:hover{background:#6a62cc;}
.btn-out{background:transparent;color:var(--navy);border-color:var(--border);}.btn-out:hover{border-color:var(--navy);background:var(--bg);}
.btn-ghost{background:transparent;color:var(--sub);border-color:transparent;}.btn-ghost:hover{background:var(--bg);color:var(--text);}
.btn-sm{padding:5px 11px;font-size:12px;}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:500;border-bottom:2px solid transparent;color:var(--sub);cursor:pointer;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;transition:all .12s;}
.tab-btn.on{color:var(--navy);border-bottom-color:var(--navy);font-weight:600;}
.tab-pnl{display:none;padding:16px 18px;}.tab-pnl.on{display:block;}
.notice{border-radius:var(--rs);padding:10px 13px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;font-size:12px;}
.n-info{background:var(--info-bg);color:var(--info);border-left:3px solid var(--info);}
.n-warn{background:var(--warn-bg);color:var(--warn);border-left:3px solid var(--warn);}
.n-ok{background:var(--ok-bg);color:var(--ok);border-left:3px solid var(--ok);}
.n-danger{background:var(--danger-bg);color:var(--danger);border-left:3px solid var(--danger);}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--sub);border-bottom:1px solid var(--border);background:#FAFBFD;white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}tr:hover td{background:#FAFBFD;}
.num{font-family:'SF Mono',Consolas,monospace;text-align:right;font-size:12px;}
.num-pos{color:var(--ok);font-weight:600;}.num-neg{color:var(--danger);font-weight:600;}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.fl{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.03em;}
.fl .req{color:var(--danger);margin-left:2px;}
.fi,.fsel,.fta{padding:8px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text);background:#fff;outline:none;width:100%;transition:border-color .12s;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,42,74,.07);}
.fta{min-height:68px;resize:vertical;font-family:inherit;}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--navy);color:#fff;}
.rank-chip{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;font-size:13px;font-weight:700;}
.steps{display:flex;align-items:center;overflow-x:auto;padding:4px 0 8px;}
.step{display:flex;flex-direction:column;align-items:center;min-width:76px;}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.sd-done{background:var(--ok);color:#fff;}.sd-active{background:var(--navy);color:#fff;box-shadow:0 0 0 4px rgba(27,42,74,.12);}.sd-pending{background:var(--border);color:var(--sub);}
.step-lbl{font-size:10px;color:var(--sub);margin-top:4px;text-align:center;line-height:1.3;}
.step-conn{flex:1;height:2px;background:var(--border);min-width:16px;}.sc-done{background:var(--ok);}
.inline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sec-div{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;padding-bottom:5px;border-bottom:1px solid var(--border);margin:16px 0 10px;}
.text-sub{color:var(--sub);font-size:12px;}.text-light{color:var(--light);font-size:11px;}
.comp-lib-chip{display:inline-flex;flex-direction:column;padding:6px 10px;border-radius:var(--rs);border:1px solid var(--border);font-size:12px;cursor:pointer;margin:3px;color:var(--sub);background:#fff;transition:all .12s;max-width:260px;}
.comp-lib-chip:hover{border-color:var(--navy);color:var(--text);}
.comp-lib-chip.selected{background:var(--info-bg);color:var(--info);border-color:var(--info);}
.comp-lib-chip .chip-name{font-weight:600;font-size:12px;}
.comp-lib-chip .chip-desc{font-size:10px;color:var(--light);margin-top:2px;line-height:1.4;}
.comp-lib-chip .chip-reverse{font-size:10px;color:#E59C8A;margin-top:2px;}
.cat-hd{background:var(--bg);padding:8px 12px;border-radius:var(--rs);margin-bottom:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);}
.cat-hd:hover{background:#eaeef6;}
.cat-body{padding:4px 0 10px;display:none;}.cat-body.open{display:block;}
#login-page{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;}
.login-box{background:#fff;border-radius:16px;padding:38px 34px;width:360px;box-shadow:var(--sh2);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-icon{width:52px;height:52px;background:var(--red);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;margin:0 auto 10px;}
.locked-row td{opacity:.5;pointer-events:none;background:#FAFBFD;}
.lock-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--light);background:#F0F2F7;border-radius:4px;padding:2px 6px;}
.text-sub{color:var(--sub);font-size:12px}.text-light{color:var(--light);font-size:11px}
.b-gold{background:#FEF9E7;color:#9A7000}.gap-4{gap:4px!important}
</style>
</head>
<body>
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-icon">IWO</div>
      <h1 style="font-size:20px;font-weight:700;color:var(--navy)">評価システム</h1>
      <p style="font-size:12px;color:var(--sub);margin-top:3px">株式会社アイダブルオー v3.3（本番接続版）</p>
    </div>
    <div class="fg"><label class="fl">メールアドレス</label><input class="fi" id="login-email" type="email" placeholder="taro@iwo.co.jp" autocomplete="username" onkeydown="if(event.key==='Enter')login()"></div>
    <div class="fg" style="margin-bottom:8px"><label class="fl">パスワード</label><input class="fi" id="login-pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"></div>
    <div id="login-err" style="display:none;color:var(--danger);font-size:12px;margin-bottom:10px;line-height:1.5"></div>
    <button class="btn btn-navy" id="login-btn" style="width:100%;justify-content:center;padding:11px;font-size:14px" onclick="login()">ログイン</button>
    <p style="margin-top:14px;font-size:11px;color:var(--sub);text-align:center;line-height:1.6">パスワードをお忘れの場合は<br>管理者（和氣）までご連絡ください</p>
  </div>
</div>
<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sb-logo"><div class="sb-logo-mark"><div class="sb-icon">IWO</div><div><div class="sb-title">評価システム</div><div class="sb-ver">v3.3（本番接続版）</div></div></div></div>
    <div class="sb-user"><div class="sb-avatar" id="sb-avatar">和</div><div><div class="sb-uname" id="sb-name">和氣 佑輔</div><div class="sb-urole" id="sb-role">管理者</div></div></div>
    <div id="sb-content"></div>
  </div>
  <div id="main">
    <div id="topbar">
      <div class="tb-title" id="tb-title">ダッシュボード</div>
      <div class="tb-right">
        <span style="font-size:12px;color:var(--sub)" id="tb-period"></span>
        <span class="q-pill" id="tb-q"></span>
        <button class="btn btn-ghost btn-sm" onclick="openPassChange()">🔑 パスワード変更</button>
        <button class="btn btn-ghost btn-sm" onclick="logout()">ログアウト</button>
      </div>
    </div>
    <div id="content" style="padding:26px 26px 40px"></div>
  </div>
</div>
<script>// ===== IWO評価システム v2.3 データ =====
const DB = {
  // 本番接続版：起動時は空。ログイン後に Supabase から全データを読み込む。
  periods:[],currentPeriod:'',currentQ:'Q1',
  depts:[],teams:{},positions:[],members:[],
  fixedOTSettings:{hours:159,otHours:20,rate:1.25},
  params:{avgWorkHours:159,incentiveRate:30,incentiveTrigger:100,bonusThreshold:80,bonusUpRate:10,pitchGeneral:1000,pitchLeader:1500,minWage:1047,minWageHours:172},
  brightRanks:['A','B','C','D','E'],brightDist:{A:40,B:30,C:15,D:10,E:5},
  brightLineData:{},incentiveAdjust:{},incentiveAdminConfirmed:{},
  bonusAdjust:{},kgiData:{},compLib:[],sheets:{},
  incentiveHistory:{},bonusHistory:{},salaryHistory:{},
};

// ===== ヘルパー =====
const RANK_DEF=[
  {rank:'S+',min:86,p:8,color:'#1D9E75',bg:'#EAF3DE'},{rank:'S',min:76,p:6,color:'#3B8BD4',bg:'#E6F1FB'},
  {rank:'A+',min:71,p:4,color:'#7F77DD',bg:'#EEEDFE'},{rank:'A',min:66,p:3,color:'#9F8FE8',bg:'#F3F2FE'},
  {rank:'B+',min:61,p:2,color:'#5CA3DC',bg:'#EAF3FB'},{rank:'B',min:56,p:1,color:'#6AAA31',bg:'#EAF3DE'},
  {rank:'C',min:51,p:0,color:'#8A8880',bg:'#F0EFEE'},{rank:'C-',min:46,p:-1,color:'#D49B20',bg:'#FAEEDA'},
  {rank:'D',min:36,p:-2,color:'#D05050',bg:'#FCEBEB'},{rank:'D-',min:0,p:-4,color:'#C02020',bg:'#FDF2F2'},
];
function getRank(s){for(const r of RANK_DEF)if(s>=r.min)return r;return RANK_DEF[RANK_DEF.length-1];}
const BC_C=['#1D9E75','#3B8BD4','#7F77DD','#D49B20','#D05050','#C02020','#BA7517','#0F6E56'];
const BC_B=['#EAF3DE','#E6F1FB','#EEEDFE','#FAEEDA','#FCEBEB','#FDF2F2','#FEF3E7','#E0F4F0'];
function getBrightColor(i){return{color:BC_C[i%BC_C.length],bg:BC_B[i%BC_B.length]};}
const ROLE_LABELS={admin:'管理者',final:'最終評価者',ev1:'1次評価者',member:'メンバー',naikan:'内勤',keiri:'経理'};

// スコア計算式（Excel「素点一覧」準拠）：
// 行動スコア ＝（Σ評価×WT ÷ ΣWT）×（コンピテンシー配点ウェイト ÷ 4）… 小数第2位切り捨て
// 成果スコア ＝（Σ評価×WT ÷ ΣWT）×（KPI配点ウェイト ÷ 6）… 小数第2位切り捨て
// 最終評点 ＝ 行動スコア ＋ 成果スコア（100点満点）
function trunc2(v){return Math.floor(v*100)/100;}
function calcSheetTotal(sheet){
  const wsum=items=>items.reduce((a,x)=>a+(x.weight||0),0);
  const wavg=(items)=>{const w=wsum(items);if(!w)return 0;return items.reduce((a,x)=>a+((x.finalScore??x.ev1Score??0)*(x.weight||0)),0)/w;};
  const comp=trunc2(wavg(sheet.compItems)*(sheet.compWeight/4));
  const kpi=trunc2(wavg(sheet.kpiItems)*(sheet.kpiWeight/6));
  return{comp,kpi,total:trunc2(comp+kpi)};
}
function calcScore(sheet){
  if(!sheet||['goal_setting','goal_wait','goal_locked'].includes(sheet.status))return null;
  if(sheet.status!=='confirmed')return null;
  return calcSheetTotal(sheet).total;
}
function getScores(pid=DB.currentPeriod){
  const r={};
  DB.members.filter(m=>m.eval!=='除外'&&!m.isNaikan).forEach(m=>{
    r[m.code]={};
    ['Q1','Q2','Q3','Q4'].forEach(q=>{r[m.code][q]=calcScore(DB.sheets[m.code]?.[pid]?.[q]);});
  });
  return r;
}
function getBrightRanks(pid,q){
  // 優先順位：①管理者確定のブライトline → ②過去履歴のbrightMap → ③スコアからの自動仮ランク
  const bl=DB.brightLineData?.[pid]?.[q];
  if(bl?.adminConfirmed&&Object.keys(bl.confirmed||{}).length>0)return bl.confirmed;
  const hist=DB.incentiveHistory[pid]?.[q];
  if(hist?.brightMap&&Object.keys(hist.brightMap).length>0)return hist.brightMap;
  const scores=getScores(pid);
  const valid=DB.members.filter(m=>m.eval!=='除外'&&!m.isNaikan&&scores[m.code]?.[q]!=null)
    .map(m=>({code:m.code,score:scores[m.code][q]})).sort((a,b)=>b.score-a.score);
  const n=valid.length,ranks=DB.brightRanks,result={};
  let idx=0;
  ranks.forEach((r,ri)=>{const cnt=Math.floor(n/ranks.length)+(ri<n%ranks.length?1:0);for(let i=0;i<cnt;i++)if(idx<valid.length)result[valid[idx++].code]=r;});
  return result;
}
// 賞与（基本給部分）＝（基本給＋固定残業手当＋職務手当＋役職手当）× KGI達成率（半期実績÷半期KGI）
// ※達成率が賞与発動閾値（80%）未満の場合は支給なし
function calcBonusBase(m,pid,half){
  const d=DB.kgiData[pid]?.[half]||{kgi:0,gross:0};
  if(!d.kgi)return 0;
  const rate=d.gross/d.kgi;
  if(rate*100<DB.params.bonusThreshold)return 0;
  return Math.round(totalBase(m)*rate);
}
function calcPool(pid,q){
  const d=DB.kgiData[pid]?.[q]||{kgi:0,gross:0};
  return Math.max(0,(d.gross-d.kgi)*(DB.params.incentiveRate/100));
}
function totalBase(m){return m.base+m.posAllow+m.jobAllow+m.fixedOT;}
function fmt(n){return typeof n==='number'?n.toLocaleString():'—';}
function calcFixedOT(baseAfter){
  const s=DB.fixedOTSettings;
  return Math.round(baseAfter/s.hours*s.rate*s.otHours/1000)*1000;
}
function calcSalaryRow(s){
  const fixedOTAfter=calcFixedOT(s.baseAfter);
  const jobAllowAfter=s.jobAllowBefore+s.adjAmt;
  const pitchChange=s.adjAmt;
  const total=s.baseAfter+fixedOTAfter+jobAllowAfter+s.posAllow;
  return{...s,fixedOTAfter,jobAllowAfter,pitchChange,total};
}
function payStatusBadge(s){
  const m={paid:'<span class="badge b-ok">支給済</span>',pending:'<span class="badge b-warn">確定待ち</span>',no_pool:'<span class="badge b-red">支給なし</span>',future:'<span class="badge b-gray">支給予定</span>'};
  return m[s]||'<span class="badge b-gray">—</span>';
}
function statusBadge(s){

<script>// ===== 給与改定計算モジュール v2.3 =====
// Fix 1: 内勤行の列ずれ修正（colspan="6"で評価系6列をまとめ、給与列を正順表示）
// Fix 2: メンバー・1次評価者は自分のコードのみ displayCodes でフィルタリング

function calcFixedOTNew(base) {
  const s = DB.fixedOTSettings;
  const raw = base / s.hours * s.rate * s.otHours;
  return Math.ceil(raw / 1000) * 1000;
}

function getPitchUnit(m) {
  return m.pos === 'リーダー' ? DB.params.pitchLeader : DB.params.pitchGeneral;
}

function calcSalaryFull(s, m) {
  const pitchUnit = getPitchUnit(m);
  const pitchAmt = s.pitch * pitchUnit;
  const baseAfter = s.baseBefore + pitchAmt;
  const fixedOTBefore = calcFixedOTNew(s.baseBefore);
  const fixedOTAfter = calcFixedOTNew(baseAfter);
  const adjAmt = s.adjPitch * pitchUnit;
  const X = (baseAfter + fixedOTAfter) - (s.baseBefore + fixedOTBefore);
  const Y = (pitchAmt + adjAmt) - X;
  const jobAllowAfter = s.jobAllowBefore + Y;
  const total = baseAfter + fixedOTAfter + jobAllowAfter + s.posAllow;
  return {
    ...s,
    pitchUnit,
    pitchAmt,
    baseAfter,
    fixedOTBefore,
    fixedOTAfter,
    adjAmt,
    X,
    Y,
    jobAllowAfter,
    total,
  };
}

function salaryRowHTML(s, m, role, confirmed, isNaikan=false) {
  const r = calcSalaryFull(s, m);
  const isAdmin = role === 'admin';
  const isFinal = role === 'final';

  if (isPrivate && !confirmed) {
    return `<tr>
      <td>${memberCell(m.code)}</td>
      <td colspan="13" style="text-align:center;color:var(--light);font-style:italic">— 給与改定確定後に表示されます —</td>

  // colspan="6" でまとめ、残りの給与列を正しい順序（前基本給→改定基本給→固定残業手当→前職務手当→改定職務手当→役職手当→総支給額）で表示
  if (isNaikan) {
    const tot = r.baseAfter + r.fixedOTAfter + r.jobAllowAfter + r.posAllow;
    return `<tr style="background:#FEF9E7">
      <td><div class="inline"><div class="avatar" style="background:#BA7517">${m.name[0]}</div><span style="font-weight:600">${m.name}</span></div></td>
      <td colspan="6" style="color:var(--light);text-align:center;font-size:11px">手入力（評価対象外）</td>
      <td class="num">${fmt(s.baseBefore)}円</td>
      <td class="num">${isAdmin&&!confirmed&&window._salaryInputOpen?`<input type="number" style="width:85px;font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:right" value="${r.baseAfter}">`:`<span style="font-weight:700">${fmt(r.baseAfter)}円</span>`}</td>
      <td class="num" style="color:var(--info)">${fmt(r.fixedOTAfter)}円</td>
      <td class="num">${fmt(s.jobAllowBefore)}円</td>
      <td class="num">${isAdmin&&!confirmed&&window._salaryInputOpen?`<input type="number" style="width:75px;font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:right" value="${r.jobAllowAfter}">`:`<span style="font-weight:600">${fmt(r.jobAllowAfter)}円</span>`}</td>
      <td class="num">${fmt(r.posAllow)}円</td>
      <td class="num num-pos" style="font-weight:700">${fmt(tot)}円</td>

  const rankR = s.annualAvg!=null ? getRank(s.annualAvg) : null;
  return `<tr style="${floored?'background:var(--warn-bg)':''}">
    <td>${memberCell(m.code)}</td>
    <td class="num">${s.annualAvg??'—'}</td>
    <td style="text-align:center">${rankR?`<span class="rank-chip" style="background:${rankR.bg};color:${rankR.color}">${rankR.rank}</span>`:'—'}</td>
    <td style="text-align:center;font-weight:700;color:${s.pitch>=0?'var(--ok)':'var(--danger)'}">${s.pitch>=0?'+':''}${s.pitch}P</td>

    <td class="num ${r.adjAmt>0?'num-pos':r.adjAmt<0?'num-neg':''}">${r.adjAmt>0?'+':''}${fmt(r.adjAmt)}円</td>

  </tr>`;
}

function ensureSalaryItems(pid){
  const sal=DB.salaryHistory[pid];if(!sal||sal.finalApproved)return;
  const scores=getScores(pid);
  sal.items=sal.items||{};sal.naikanItems=sal.naikanItems||{};
  DB.members.filter(m=>!m.isNaikan&&m.eval!=='除外').forEach(m=>{
    const qv=[scores[m.code]?.Q1,scores[m.code]?.Q2,scores[m.code]?.Q3,scores[m.code]?.Q4].filter(v=>v!=null);
    const avg=qv.length?Math.round(qv.reduce((a,v)=>a+v,0)/qv.length*10)/10:null;
    const rk=avg!=null?getRank(avg):null;
    const prev=sal.items[m.code]||{};
    sal.items[m.code]={
      annualAvg:avg,rank:rk?rk.rank:null,pitch:rk?rk.p:0,
      adjPitch:prev.adjPitch||0,
      baseBefore:m.base||0,jobAllowBefore:m.jobAllow||0,
      posAllow:m.posAllow||0,commute:m.commute||0,
    };
  });
  DB.members.filter(m=>m.isNaikan).forEach(m=>{
    const prev=sal.naikanItems[m.name]||{};
    sal.naikanItems[m.name]={
      annualAvg:null,rank:null,pitch:0,
      adjPitch:prev.adjPitch||0,
      baseBefore:m.base||0,jobAllowBefore:m.jobAllow||0,
      posAllow:m.posAllow||0,commute:m.commute||0,
    };
  });
}

<script>// ===== SHARED HELPERS =====

    if(!currentVal)return'<span style="color:var(--light)">—</span>';

function renderBright(){
  const isAdmin=CU.role==='admin';

  const pool=calcPool(selPid,selQ);

  const evalMs=DB.members.filter(m=>!m.isNaikan&&m.eval!=='除外');
  const finalMembers=DB.members.filter(m=>m.role==='final');
  // 管理者の確定BL or 旧brightMap
  const confirmedBL=blData.confirmed||{};
  const adminConfirmed=blData.adminConfirmed||false;

  // メンバー・1次評価者・経理: 自分の確定ランクのみ表示

    const myRank=confirmedBL[CU.code];

function setBLRank(pid,q,evCode,memberCode,val){

  if(!DB.brightLineData[pid][q].ev1[evCode])DB.brightLineData[pid][q].ev1[evCode]={};

  if(!DB.brightLineData[pid]?.[q])return;

function renderBonus(){
  const isAdmin=CU.role==='admin';
  const isFinal=CU.role==='final';
  const isKeiri=CU.role==='keiri';
  const isPrivate=CU.role==='member'||CU.role==='ev1';

  if(!h)return`<div class="pg-hd"><div class="pg-title">賞与</div></div>${halfSelector('renderPage(CP)')}データなし`;

      upSubtotal+=(bl?(pool*(DB.brightDist[bl]||0)/100):0)*10000;

    const a=isAdmin?(adj.naikanAdj?.[m.name]||0):0;

    return`<tr style="background:#FEF9E7"><td>${selHalf==='H1'?'上期':'下期'}</td>

  const {comp,kpi,total}=calcSheetTotal(sheet);
  const compWsum=sheet.compItems.reduce((a,x)=>a+(x.weight||0),0)||100;
  const kpiWsum=sheet.kpiItems.reduce((a,x)=>a+(x.weight||0),0)||100;
  const rank=confirmed&&total>0?getRank(total):null;
  const pastQs=['Q1','Q2','Q3','Q4'].filter(pq=>pq!==q&&DB.sheets[code]?.[evalPid]?.[pq]?.status==='confirmed');
  const stepDots=[
    {l:'目標設定\n完了',done:['goal_locked','self_eval','ev1_wait','ev1','final_wait','final','admin_wait','confirmed'].includes(sheet.status),active:['goal_setting','goal_wait'].includes(sheet.status)},
    {l:'自己評価\n完了',done:['ev1_wait','ev1','final_wait','final','admin_wait','confirmed'].includes(sheet.status),active:sheet.status==='self_eval'},
    ...(m.ev1?[{l:'1次評価\n完了',done:['final_wait','final','admin_wait','confirmed'].includes(sheet.status),active:['ev1','ev1_wait'].includes(sheet.status)}]:[]),
    ...(m.evFinal?[{l:'最終評価\n完了',done:['admin_wait','confirmed'].includes(sheet.status),active:['final','final_wait'].includes(sheet.status)}]:[]),
    {l:'評価\n確定',done:sheet.status==='confirmed',active:sheet.status==='admin_wait'},
  ];
  const steps=stepDots.map((st,i)=>`${i>0?`<div class="step-conn ${st.done?'sc-done':''}"></div>`:''}
    <div class="step"><div class="step-dot ${st.done?'sd-done':st.active?'sd-active':'sd-pending'}">${st.done?'✓':i+1}</div><div class="step-lbl" style="white-space:pre-line">${st.l}</div></div>`).join('');
  const canEditGoals=(isAdmin&&!confirmed)||(isSelf&&sheet.status==='goal_setting')||(isGoalApprover&&sheet.status==='goal_wait');
  const canEdit=canEditGoals;
  const compRows=sheet.compItems.map((item,i)=>{
    const itemLocked=item.locked&&!isAdmin;const itemGoalOnly=false;
    return`<tr class="${itemLocked?'locked-row':''}">
      <td>
        <div style="font-size:11px;font-weight:600;color:var(--info)">${item.id}</div>
        <div style="font-size:13px;font-weight:500">${item.name}</div>
        <div style="font-size:11px;color:var(--light);margin-top:2px">${item.desc}</div>
        <div style="margin-top:6px;padding:6px 8px;background:var(--bg);border-radius:4px;border-left:3px solid var(--info)">
          <div style="font-size:10px;color:var(--sub);font-weight:600;margin-bottom:2px">目標</div>
          ${isSelf&&sheet.status==='goal_setting'&&!itemLocked?`<input class="fi" style="font-size:12px;padding:4px 8px" value="${item.goal}" placeholder="目標を入力してください" onchange="setItemGoal('comp','${code}','${q}',${i},this.value)">`:`<div style="font-size:12px;color:var(--text);white-space:pre-wrap;word-break:break-word">${item.goal||'—'}</div>`}
        </div>
      </td>
      <td class="num">${item.weight}%</td>
      <td style="text-align:center">${canSelfInput&&!itemGoalOnly?scoreSelect(item.selfScore,4,`setItemScore('comp','${code}','${q}',${i},'selfScore',this.value)`):scoreChip(item.selfScore,4)}</td>
      <td style="text-align:center">${m.ev1?(canEv1Input?scoreSelect(item.ev1Score,4,`setItemScore('comp','${code}','${q}',${i},'ev1Score',this.value)`):scoreChip(item.ev1Score,4)):'<span style="color:var(--light)">—</span>'}</td>
      <td style="text-align:center">${canFinalInput?scoreSelect(item.finalScore,4,`setItemScore('comp','${code}','${q}',${i},'finalScore',this.value)`):scoreChip(item.finalScore,4)}</td>
      <td class="num">${(((item.finalScore??item.ev1Score??0)*(item.weight||0)/compWsum)*(sheet.compWeight/4)).toFixed(2)}</td>
      <td>
        ${itemLocked?`<span class="lock-badge">🔒 ロック</span>`:canEdit?`<button class="btn btn-out btn-sm" onclick="openItemEdit('comp','${code}','${q}',${i})">修正</button>`:
        !confirmed&&isSelf?`<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removeCompItem('${code}','${q}',${i})">✕</button>`:''}
        ${isAdmin&&itemLocked?`<button class="btn btn-warn btn-sm" onclick="unlockItem('comp','${code}','${q}',${i})">🔓解除</button>`:''}
      </td>
    </tr>`;
  }).join('');
  const kpiRows=sheet.kpiItems.map((item,i)=>{
    const itemLocked=item.locked&&!isAdmin;
    return`<tr class="${itemLocked?'locked-row':''}">
      <td>
        <div style="font-size:13px;font-weight:500">${item.name}</div>
        <div style="margin-top:6px;padding:6px 8px;background:var(--bg);border-radius:4px;border-left:3px solid var(--warn)">
          <div style="font-size:10px;color:var(--sub);font-weight:600;margin-bottom:2px">目標</div>
          ${isSelf&&sheet.status==='goal_setting'&&!itemLocked?`<input class="fi" style="font-size:12px;padding:4px 8px" value="${item.goal}" placeholder="目標を入力してください" onchange="setItemGoal('kpi','${code}','${q}',${i},this.value)">`:`<div style="font-size:12px;color:var(--text);white-space:pre-wrap;word-break:break-word">${item.goal||'—'}</div>`}
        </div>
      </td>
      <td class="num">${item.weight}%</td>
      <td style="text-align:center">${canSelfInput?scoreSelect(item.selfRate,6,`setItemScore('kpi','${code}','${q}',${i},'selfRate',this.value)`):(item.selfRate!=null?scoreChip(item.selfRate,6):'<span style="color:var(--light)">—</span>')}</td>
      <td style="text-align:center">${m.ev1?(canEv1Input?scoreSelect(item.ev1Score,6,`setItemScore('kpi','${code}','${q}',${i},'ev1Score',this.value)`):(item.ev1Score!=null?scoreChip(item.ev1Score,6):'<span style="color:var(--light)">—</span>')):'<span style="color:var(--light)">—</span>'}</td>
      <td style="text-align:center">${canFinalInput?scoreSelect(item.finalScore,6,`setItemScore('kpi','${code}','${q}',${i},'finalScore',this.value)`):scoreChip(item.finalScore,6)}</td>
      <td class="num">${(((item.finalScore??item.ev1Score??0)*(item.weight||0)/kpiWsum)*(sheet.kpiWeight/6)).toFixed(2)}</td>
      <td>
        ${itemLocked?`<span class="lock-badge">🔒 ロック</span>`:canEdit?`<button class="btn btn-out btn-sm" onclick="openItemEdit('kpi','${code}','${q}',${i})">修正</button>`
        :!confirmed&&isSelf?`<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removeKpiItem('${code}','${q}',${i})">✕</button>`:''}
        ${isAdmin&&itemLocked?`<button class="btn btn-warn btn-sm" onclick="unlockItem('kpi','${code}','${q}',${i})">🔓解除</button>`:''}
      </td>
    </tr>`;
  }).join('');
  const canGoalSubmit=isSelf&&sheet.status==='goal_setting'&&!locked;
  const canSelfSubmit=isSelf&&sheet.status==='self_eval'&&(qStat==='active'||qStat==='confirmed');
  const canGoalApprove=(isGoalApprover||isAdmin)&&sheet.status==='goal_wait';
  const anyItemLocked=sheet.compItems.some(x=>x.locked)||sheet.kpiItems.some(x=>x.locked);
  return`<div class="card"><div class="card-hd">
    <span class="card-title">👤 ${m.name}（${m.pos}） ${q}</span>
    <div class="inline gap-4">
      <span class="badge b-gray">1次：${ev1Name}</span><span class="badge b-purple">最終：${finalName}</span>
      ${statusBadge(sheet.status)}
      ${locked&&!isAdmin?'<span class="badge b-gray">🔒 ロック済</span>':''}
      ${isAdmin&&locked?`<button class="btn btn-warn btn-sm" onclick="unlockSheet('${code}','${q}')">🔓 シートロック解除</button>`:''}
    </div>
  </div>
  <div class="card-body" style="padding-bottom:10px"><div class="steps">${steps}</div></div>
  <div style="padding:0 18px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    ${/* ① メンバー：目標の承認依頼 */ canGoalSubmit?`<button class="btn btn-navy btn-sm" onclick="submitGoal('${code}','${q}')">📤 目標を保存・承認依頼</button>`:''}
    ${/* ② 上長：目標の承認（WT調整・修正後にロック） */ canGoalApprove?`
      <button class="btn btn-ok btn-sm" onclick="lockGoals('${code}','${q}')">✅ 目標設定完了（目標をロック）</button>
      <button class="btn btn-out btn-sm" style="color:var(--danger)" onclick="returnGoal('${code}','${q}')">↩ メンバーへ差し戻し</button>`:''}
    ${/* 目標ロック済・評価開始待ち */ sheet.status==='goal_locked'?`<span class="badge b-navy">🔒 目標ロック済 — 管理者の評価開始待ち</span>`:''}
    ${/* ③ メンバー：自己評価の承認依頼 */ canSelfSubmit?`<button class="btn btn-navy btn-sm" onclick="submitSelfEval('${code}','${q}')">📤 自己評価を保存・承認依頼</button>`:''}
    ${/* 評価開始前 */ isSelf&&sheet.status==='self_eval'&&!(qStat==='active'||qStat==='confirmed')?`<span class="badge b-gray">⏳ 管理者の評価開始待ち — 開始後に自己評価を入力できます</span>`:''}
    ${/* ④ 1次評価者 */ CU.role==='ev1'&&m.ev1===CU.code&&sheet.status==='ev1_wait'?`
      <button class="btn btn-ok btn-sm" onclick="submitEv1('${code}','${q}')">✅ 1次評価を確定・最終評価者へ承認依頼</button>
      <button class="btn btn-out btn-sm" style="color:var(--danger)" onclick="returnToSelf('${code}','${q}')">↩ メンバーへ差し戻し</button>`:''}
    ${/* ⑤ 最終評価者 */ CU.role==='final'&&m.evFinal===CU.code&&sheet.status==='final_wait'?`
      <button class="btn btn-purple btn-sm" onclick="submitFinal('${code}','${q}')">✅ 最終評価を確定・管理者へ</button>
      <button class="btn btn-out btn-sm" style="color:var(--danger)" onclick="returnToEv1('${code}','${q}')">↩ ${m.ev1?'1次評価者へ差し戻し':'メンバーへ差し戻し'}</button>`:''}
    ${/* ⑥ 管理者最終確定 — 最終評価者の確定後にのみ表示 */ CU.role==='admin'&&sheet.status==='admin_wait'?`
      <button class="btn btn-navy btn-sm" onclick="adminFinalConfirm('${code}','${q}')">🔒 最終確定</button>
      <button class="btn btn-out btn-sm" style="color:var(--danger)" onclick="adminReturnToFinal('${code}','${q}')">↩ 最終評価者へ差し戻し</button>`:''}
    ${/* 管理者：目標ロック解除 */ isAdmin&&!confirmed&&(sheet.status==='goal_locked'||anyItemLocked)?`<button class="btn btn-warn btn-sm" onclick="adminUnlockGoals('${code}','${q}')">🔓 目標ロック解除（管理者のみ）</button>`:''}
    ${CU.role==='admin'&&sheet.status==='confirmed'?`<span class="badge b-ok">✅ 確定済 — 再開するには管理者ロック解除が必要です</span>`:''}
  </div></div>

  <div style="display:flex;border-bottom:1px solid var(--border);background:#fff;border-radius:var(--r) var(--r) 0 0;overflow:hidden;border:1px solid var(--border);border-bottom:none">
    <button class="tab-btn on" data-tabg="eval" onclick="swTab('ec',this,'eval')">現在（${q}）</button>
    ${pastQs.map(pq=>`<button class="tab-btn" data-tabg="eval" onclick="swTab('ep-${pq}',this,'eval')">${pq} 履歴</button>`).join('')}
  </div>
  <div id="ec" data-tabpnl="eval" class="tab-pnl on" style="padding:0">
    <div class="card" style="border-radius:0;border-top:none;margin-bottom:0">
      <div class="card-hd"><span class="card-title">📋 コンピテンシー（行動目標）</span>
        <div class="inline gap-4"><span class="badge b-info">評価ウェイト ${sheet.compWeight}%</span>${canWeight?'<button class="btn btn-out btn-sm">ウェイト変更</button>':''}</div>
      </div>
      <div class="tbl-wrap"><table><thead><tr><th>項目・着眼点・目標</th><th style="text-align:right">WT%</th><th style="text-align:center">自己(1〜4)</th><th style="text-align:center">1次(1〜4)</th><th style="text-align:center">最終(1〜4)</th><th style="text-align:right">獲得点</th><th></th></tr></thead>
      <tbody>${compRows||'<tr><td colspan="7" style="color:var(--light);text-align:center;padding:20px">項目未設定</td></tr>'}</tbody>
      <tfoot><tr style="background:#FAFBFD;font-weight:600"><td colspan="6" style="text-align:right;font-size:11px;color:var(--sub)">行動スコア合計（${sheet.compWeight}点満点）</td><td class="num">${comp.toFixed(2)}</td></tr></tfoot></table></div>
      ${(isSelf&&sheet.status==='goal_setting')||(isAdmin&&!confirmed)?`<div style="padding:10px 18px;border-top:1px solid var(--border)"><button class="btn btn-out btn-sm" onclick="openCompPicker('${code}','${q}')">＋ コンピテンシー項目を追加</button></div>`:''}
    </div>
    <div class="card" style="border-radius:0;border-top:none;margin-bottom:0">
      <div class="card-hd"><span class="card-title">📈 数値目標（KPI）</span><div class="inline gap-4" style="flex:1;justify-content:flex-end;flex-wrap:wrap"><span style="font-size:10.5px;color:var(--sub);line-height:1.5;text-align:right">※自己達成率：1点（80％未満）／2点（80％以上90％未満）／3点（90％以上100％未満）／4点（100％以上105％未満）／5点（105％以上110％未満）／6点（110％以上）</span><span class="badge b-info">評価ウェイト ${sheet.kpiWeight}%</span></div></div>
      <div class="tbl-wrap"><table><thead><tr><th>目標項目・目標</th><th style="text-align:right">WT%</th><th style="text-align:center">自己達成率(1〜6)</th><th style="text-align:center">1次(1〜6)</th><th style="text-align:center">最終(1〜6)</th><th style="text-align:right">獲得点</th><th></th></tr></thead>
      <tbody>${kpiRows||'<tr><td colspan="7" style="color:var(--light);text-align:center;padding:20px">項目未設定</td></tr>'}</tbody>
      <tfoot><tr style="background:#FAFBFD;font-weight:600"><td colspan="6" style="text-align:right;font-size:11px;color:var(--sub)">成果スコア合計（${sheet.kpiWeight}点満点）</td><td class="num">${kpi.toFixed(2)}</td></tr></tfoot></table></div>
      ${(isSelf&&sheet.status==='goal_setting')||(isAdmin&&!confirmed)?`<div style="padding:10px 18px;border-top:1px solid var(--border)"><button class="btn btn-out btn-sm" onclick="openKpiAdd('${code}','${q}')">＋ KPI項目を追加</button></div>`:''}
    </div>
    ${confirmed||total>0?`<div class="card" style="border-radius:0 0 var(--r) var(--r);border-top:none;margin-bottom:0"><div class="card-hd"><span class="card-title">🏅 最終スコア・ランク</span></div><div class="card-body"><div class="grid4">
      <div class="stat at-navy" style="margin:0"><div class="stat-lbl">行動スコア（${sheet.compWeight}点満点）</div><div class="stat-val" style="font-size:20px">${comp.toFixed(2)}<span class="stat-unit">点</span></div></div>
      <div class="stat at-red" style="margin:0"><div class="stat-lbl">成果スコア（${sheet.kpiWeight}点満点）</div><div class="stat-val" style="font-size:20px">${kpi.toFixed(2)}<span class="stat-unit">点</span></div></div>
      <div class="stat" style="margin:0;border-top:3px solid ${rank?.color||'var(--border)'}"><div class="stat-lbl">最終評点（100点満点）</div><div class="stat-val" style="font-size:22px;color:${rank?.color||'var(--navy)'}">${total.toFixed(2)}</div></div>
      <div class="stat" style="margin:0;border-top:3px solid ${rank?.color||'var(--border)'};text-align:center"><div class="stat-lbl">ランク</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px"><span style="font-size:26px;font-weight:800;color:${rank?.color||'var(--sub)'}">${rank?.rank||'—'}</span>${rank?`<div><div style="font-size:11px;color:var(--sub)">ピッチ変動</div><div style="font-size:13px;font-weight:700;color:${rank.p>=0?'var(--ok)':'var(--danger)'}">${rank.p>=0?'+':''}${rank.p}P</div></div>`:''}</div>
      </div></div></div></div>`:''}
  </div>
  ${pastQs.map(pq=>{const ps=DB.sheets[code]?.[evalPid]?.[pq];const pscore=calcScore(ps);const pr=pscore?getRank(pscore):null;return`<div id="ep-${pq}" data-tabpnl="eval" class="tab-pnl" style="padding:0"><div style="padding:14px 18px;background:var(--bg);border:1px solid var(--border);border-radius:0 0 var(--r) var(--r)"><div class="inline gap-4" style="margin-bottom:8px"><span class="badge b-gray">${pq}</span><span class="badge b-ok">確定済 🔒</span>${pscore?`<span style="font-size:14px;font-weight:700;color:${pr?.color}">${pscore}点 / ${pr?.rank}</span>`:''}</div><div style="font-size:12px;color:var(--sub)">コンピテンシー：${ps?.compItems?.map(x=>`${x.name}（最終:${x.finalScore??'—'}）`).join('、')||'—'}</div><div style="font-size:12px;color:var(--sub);margin-top:3px">KPI：${ps?.kpiItems?.map(x=>`${x.name}（最終:${x.finalScore??'—'}）`).join('、')||'—'}</div></div></div>`;}).join('')}
  <div id="add-item-area"></div>`;
}

function openCompPicker(code,q){
  const modal=document.getElementById('add-item-area');
  const cats=[...new Set(DB.compLib.map(x=>x.cat))];
  let html=`<div class="card" style="margin-top:12px"><div class="card-hd"><span class="card-title">コンピテンシー項目を選択（75項目）</span><button class="btn btn-ghost btn-sm" onclick="document.getElementById('add-item-area').innerHTML=''">閉じる</button></div><div class="card-body">`;
  cats.forEach(cat=>{
    const items=DB.compLib.filter(x=>x.cat===cat);
    html+=`<div class="cat-hd" onclick="this.nextElementSibling.classList.toggle('open')"><span style="font-size:12px;font-weight:600;color:var(--navy)">カテゴリ ${cat}</span><span style="font-size:11px;color:var(--sub)">${items.length}項目 ▼</span></div><div class="cat-body">`;
    items.forEach(item=>{
      html+=`<span class="comp-lib-chip" onclick="this.classList.toggle('selected')" data-id="${item.id}" data-name="${item.name}" data-desc="${item.desc}">
        <span class="chip-name">${item.id} ${item.name}</span>
        <span class="chip-desc">着眼点：${item.desc}</span>
        <span class="chip-reverse">逆：${item.reverse}</span>
      </span>`;
    });
    html+=`</div>`;
  });
  html+=`<div style="margin-top:12px">
    <div class="fgrid2"><div class="fg"><div class="fl">ウェイト（%）</div><input class="fi" id="new-cw" style="width:80px" type="number" value="20" min="1" max="100"></div></div>
    <button class="btn btn-navy btn-sm" onclick="confirmAddComp('${code}','${q}')">選択した項目を追加</button>
  </div></div></div>`;
  modal.innerHTML=html;
}
function confirmAddComp(code,q){
  const selected=document.querySelectorAll('.comp-lib-chip.selected');
  const w=parseInt(document.getElementById('new-cw').value)||20;
  const sheet=DB.sheets[code]?.[evalPid]?.[q];if(!sheet)return;
  selected.forEach(chip=>{sheet.compItems.push({id:chip.dataset.id,name:chip.dataset.name,desc:chip.dataset.desc,goal:'',weight:w,selfScore:null,ev1Score:null,finalScore:null,selfComment:'',finalComment:'',locked:false});});
  document.getElementById('add-item-area').innerHTML='';
  const el=document.getElementById('eval-detail');if(el)el.innerHTML=renderEvalDetail(code,q);
}
function removeCompItem(code,q,i){const sheet=DB.sheets[code]?.[evalPid]?.[q];if(!sheet)return;sheet.compItems.splice(i,1);const el=document.getElementById('eval-detail');if(el)el.innerHTML=renderEvalDetail(code,q);}
function removeKpiItem(code,q,i){const sheet=DB.sheets[code]?.[evalPid]?.[q];if(!sheet)return;sheet.kpiItems.splice(i,1);const el=document.getElementById('eval-detail');if(el)el.innerHTML=renderEvalDetail(code,q);}
function unlockItem(type,code,q,i){const sheet=DB.sheets[code]?.[evalPid]?.[q];if(!sheet)return;if(type==='comp')sheet.compItems[i].locked=false;else sheet.kpiItems[i].locked=false;const el=document.getElementById('eval-detail');if(el)el.innerHTML=renderEvalDetail(code,q);}
function unlockSheet(code,q){
  const sheet=DB.sheets[code]?.[evalPid]?.[q];if(!sheet)return;
  if(!confirm('シートのロックを解除しますか？（管理者権限）'))return;
  sheet.locked=false;
  if(sheet.status==='confirmed')sheet.status='admin_wait';
  sheet.compItems.forEach(x=>x.locked=false);sheet.kpiItems.forEach(x=>x.locked=false);
  alert('ロックを解除しました。修正後、再度「最終確定」でロックされます。');
  renderPage('eval-sheet');
}
function openKpiAdd(code,q){
  const modal=document.getElementById('add-item-area');
  modal.innerHTML=`<div class="card" style="margin-top:12px"><div class="card-hd"><span class="card-title">KPI項目を追加</span><button class="btn btn-ghost btn-sm" onclick="document.getElementById('add-item-area').innerHTML=''">閉じる</button></div><div class="card-body">
    <div class="fgrid3"><div class="fg"><div class="fl">KPI項目名</div><input class="fi" id="nkn" placeholder="例：月次粗利達成額"></div>
    <div class="fg"><div class="fl">具体的目標</div><input class="fi" id="nkg" placeholder="例：月次粗利175万円以上を毎月達成"></div>
    <div class="fg"><div class="fl">ウェイト（%）</div><input class="fi" id="nkw" type="number" value="20" style="width:80px"></div></div>
    <button class="btn btn-navy btn-sm" onclick="confirmAddKpi('${code}','${q}')">KPI項目を追加</button>
  </div></div>`;
}
function confirmAddKpi(code,q){
  const name=document.getElementById('nkn').value,goal=document.getElementById('nkg').value,w=parseInt(document.getElementById('nkw').value)||20;
  const sheet=DB.sheets[code]?.[evalPid]?.[q];if(!sheet||!name)return;

function qStatusBadge(st){

  return m[st]||'<span class="badge b-gray">—</span>';
}
function kgiInputCell(pid,k,field,d){
  const lockKey=field==='kgi'?'kgiLocked':'grossLocked';

  return`<div style="display:inline-flex;align-items:center;gap:6px;justify-content:flex-end">
    <input type="number" style="width:90px;font-size:12px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;text-align:right;${locked?'background:#F4F5F8;color:var(--sub)':''}" value="${d[field]}" ${locked?'disabled':''} onchange="setKgi('${pid}','${k}','${field}',this.value)">
    <button class="btn ${locked?'btn-out':'btn-ok'} btn-sm" style="padding:3px 8px;font-size:11px" onclick="toggleKgiLock('${pid}','${k}','${field}')">${locked?'修正':'確定'}</button>
  </div>`;
}
function renderPeriodKgiCard(p){
  const rows=['Q1','Q2','Q3','Q4','H1','H2'].map(k=>{
    const d=DB.kgiData[p.id]=DB.kgiData[p.id]||{};d[k]=d[k]||{kgi:0,gross:0};
    const dd=d[k];
    const r=dd.kgi>0?(dd.gross/dd.kgi*100).toFixed(1):'—';
    const isQ=k.startsWith('Q');
    const qd=isQ?p.qs[k]:null;
    const label=isQ?(qd?.label||k):(k==='H1'?'H1（上期）':'H2（下期）');
    const issueCell=!isQ?'<span style="color:var(--light)">—</span>':
      qd?.status==='future'?`<button class="btn btn-navy btn-sm" style="padding:4px 10px;font-size:11px" onclick="issueSheets('${p.id}','${k}')">シート一括発行</button>`:
      '<span class="badge b-ok" style="font-size:10px">発行済</span>';
    const startCell=!isQ?'<span style="color:var(--light)">—</span>':
      qd?.status==='goal'?`<button class="btn btn-ok btn-sm" style="padding:4px 10px;font-size:11px" onclick="startEval('${p.id}','${k}')">評価開始</button>`:
      qd?.status==='active'?'<span class="badge b-info" style="font-size:10px">開始済</span>':
      qd?.status==='confirmed'?'<span class="badge b-ok" style="font-size:10px">確定済</span>':
      '<span style="color:var(--light)">—</span>';
    return`<tr>
      <td style="font-weight:600">${label}</td>
      <td class="num">${kgiInputCell(p.id,k,'kgi',dd)}</td>
      <td style="text-align:center">${issueCell}</td>
      <td class="num">${kgiInputCell(p.id,k,'gross',dd)}</td>
      <td style="text-align:center">${startCell}</td>
      <td class="num" style="font-weight:600;color:${parseFloat(r)>=100?'var(--ok)':parseFloat(r)>=80?'var(--warn)':'var(--danger)'}">${r}%</td>
      <td>${isQ?qStatusBadge(qd?.status):'<span style="color:var(--light)">—</span>'}</td>
    </tr>`;
  }).join('');
  return`<div class="card"><div class="card-hd"><span class="card-title">${p.label}　評価シート／KGI／実績値</span>${p.year?`<span class="badge b-gray">${p.year}</span>`:''}</div>

}
function setKgi(pid,k,field,val){
  DB.kgiData[pid]=DB.kgiData[pid]||{};DB.kgiData[pid][k]=DB.kgiData[pid][k]||{kgi:0,gross:0};
  DB.kgiData[pid][k][field]=parseFloat(val)||0;
  renderPage('params');
}
function toggleKgiLock(pid,k,field){
  const d=DB.kgiData[pid]?.[k];if(!d)return;
  const key=field==='kgi'?'kgiLocked':'grossLocked';
  d[key]=!d[key];
  renderPage('params');
}
function createNewPeriod(){
  const name=prompt('新しい期の名称を入力してください（例：第13期）');
  if(!name)return;
  if(DB.periods.some(p=>p.label===name)){alert('同名の期が既に存在します。');return;}
  const num=Math.max(...DB.periods.map(p=>parseInt(p.id.slice(1))||0))+1;
  const id='P'+num;
  const period={id,label:name,year:'',qs:{
    Q1:{label:'Q1（5〜7月）',payDate:'',status:'future'},
    Q2:{label:'Q2（8〜10月）',payDate:'',status:'future'},
    Q3:{label:'Q3（11〜1月）',payDate:'',status:'future'},
    Q4:{label:'Q4（2〜4月）',payDate:'',status:'future'},

  DB.periods.unshift(period);

function issueSheets(pid,q){

  });
  const p=DB.periods.find(x=>x.id===pid);
  if(p&&p.qs[q])p.qs[q].status='goal';

function startEval(pid,q){
  const p=DB.periods.find(x=>x.id===pid);if(!p)return;
  const notLocked=DB.members.filter(m=>!m.isNaikan&&m.eval!=='除外').filter(m=>{
    const st=DB.sheets[m.code]?.[pid]?.[q]?.status;
    return st&&['goal_setting','goal_wait'].includes(st);
  });
  let msg=`${q} の評価を開始しますか？\n（メンバーの評価シートで自己（1〜4）／自己達成率（1〜6）の入力が可能になります）`;
  if(notLocked.length)msg+=`\n\n⚠️ 目標ロック未完了：${notLocked.map(m=>m.name).join('、')}`;
  if(!confirm(msg))return;
  p.qs[q].status='active';
  DB.members.filter(m=>!m.isNaikan&&m.eval!=='除外').forEach(m=>{
    const sh=DB.sheets[m.code]?.[pid]?.[q];
    if(sh&&['goal_setting','goal_wait','goal_locked'].includes(sh.status))sh.status='self_eval';
  });

}

function incAdminFinal(){
  const bl=DB.brightLineData?.[DB.currentPeriod]?.[DB.currentQ];
  if(!bl?.adminConfirmed||!Object.keys(bl.confirmed||{}).length){alert('先に「ブライトline」画面で確定BLを入力・確定してください。');return;}
  if(!confirm('インセンティブを最終確定しますか？\n確定後、メンバー全員のインセンティブ・ブライトline画面へ反映されます。'))return;
  const pool=calcPool(DB.currentPeriod,DB.currentQ);
  const h=DB.incentiveHistory[DB.currentPeriod][DB.currentQ];
  // 確定BL・支給額（調整込み）を履歴へ書き戻し
  h.brightMap={...bl.confirmed};
  h.dist={};let total=0;
  DB.members.filter(m=>!m.isNaikan&&m.eval!=='除外').forEach(m=>{
    const b=bl.confirmed[m.code];
    const base=b?pool*(DB.brightDist[b]||0)/100:0;
    const adj=DB.incentiveAdjust?.[DB.currentPeriod]?.[DB.currentQ]?.[m.code]||0;
    h.dist[m.code]=Math.round(base*100)/100; // 基本配分のみ保存（調整額はincentiveAdjustで別管理・表示時に加算）
    total+=Math.round((base+adj)*100)/100;
  });
  h.total=Math.round(total*100)/100;
  h.payStatus='paid';h.confirmed=true;
  DB.incentiveAdminConfirmed[DB.currentPeriod][DB.currentQ]=true;
  alert('最終確定しました。メンバー全員のインセンティブ・ブライトline画面へ反映されます。');
  renderPage('incentive');
}

  DB.brightDist=nd;renderPage('params');
}

function openItemEdit(type,code,q,i){
  const sheet=DB.sheets[code]?.[evalPid]?.[q];if(!sheet)return;
  const item=type==='comp'?sheet.compItems[i]:sheet.kpiItems[i];if(!item)return;
  const old=document.getElementById('edit-modal');if(old)old.remove();
  const modal=document.createElement('div');
  modal.id='edit-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center';
  modal.innerHTML=`<div style="background:#fff;border-radius:10px;padding:24px;width:480px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
    <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px">項目を修正：${item.name||item.id}</div>
    ${type==='comp'?`
      <div class="fg"><div class="fl">目標</div><textarea class="fta" id="edit-goal">${item.goal}</textarea></div>
      <div class="fg"><div class="fl">ウェイト（%）</div><input class="fi" id="edit-wt" type="number" value="${item.weight}" style="width:80px"></div>
    `:`
      <div class="fg"><div class="fl">KPI項目名</div><input class="fi" id="edit-goal" value="${item.name}"></div>
      <div class="fg"><div class="fl">目標</div><textarea class="fta" id="edit-goal2">${item.goal}</textarea></div>
      <div class="fg"><div class="fl">ウェイト（%）</div><input class="fi" id="edit-wt" type="number" value="${item.weight}" style="width:80px"></div>
    `}
    <div style="font-size:11px;color:var(--sub);margin-top:6px">※評点はシート上のプルダウンから直接入力してください。</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-out" onclick="document.getElementById('edit-modal').remove()">キャンセル（戻る）</button>
      <button class="btn btn-navy" onclick="saveItemEdit('${type}','${code}','${q}',${i})">✅ 確定・保存</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}
function saveItemEdit(type,code,q,i){
  const sheet=DB.sheets[code]?.[evalPid]?.[q];if(!sheet)return;
  const item=type==='comp'?sheet.compItems[i]:sheet.kpiItems[i];if(!item)return;
  if(type==='comp'){
    item.goal=document.getElementById('edit-goal').value;
    item.weight=parseInt(document.getElementById('edit-wt').value)||item.weight;
  } else {
    item.name=document.getElementById('edit-goal').value||item.name;
    item.goal=document.getElementById('edit-goal2').value;
    item.weight=parseInt(document.getElementById('edit-wt').value)||item.weight;
  }
  const md=document.getElementById('edit-modal');if(md)md.remove();
  const el=document.getElementById('eval-detail');if(el)el.innerHTML=renderEvalDetail(code,q);
}

<script>

const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvaWVkZ2pid21wd3R0aG51bW90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNTU1MTYsImV4cCI6MjA5ODgzMTUxNn0.P6bh7qcSgDG3gQvorvMfQNSjNYG7N_b4CuK_e_vRmgk';
const sb = window.supabase.createClient(SB_URL, SB_ANON_KEY);

// 社員コード⇔内部ID⇔氏名の対応表（読込時に作成）
const _EMP = { idByCode: {}, idByName: {}, byId: {}, byCode: {} };

// ---------- 共通：エラー通知 ----------

// 読込：Supabase → 既存DBオブジェクト形式へ変換

async function loadAllFromSupabase() {
  const g = (t) => sb.from(t).select('*');
  const results = await Promise.all([
    g('employees'), g('employee_salaries'), g('departments'), g('teams'), g('positions'),
    g('competency_library'), g('app_settings'), g('periods'), g('period_terms'),
    g('evaluation_sheets'), g('sheet_comp_items'), g('sheet_kpi_items'),
    g('brightline_inputs'), g('brightline_confirmed'), g('brightline_status'), g('brightline_approvals'),
    g('incentives'), g('incentive_details'), g('bonuses'), g('bonus_details'),
    g('salary_revisions'), g('salary_revision_items'),
  ]);
  const R = (r) => (r && !r.error && Array.isArray(r.data)) ? r.data : [];
  const T = {
    employees: R(results[0]), salaries: R(results[1]), departments: R(results[2]),
    teams: R(results[3]), positions: R(results[4]), complib: R(results[5]),
    settings: R(results[6]), periods: R(results[7]), terms: R(results[8]),
    sheets: R(results[9]), compItems: R(results[10]), kpiItems: R(results[11]),
    blInputs: R(results[12]), blConfirmed: R(results[13]), blStatus: R(results[14]), blApprovals: R(results[15]),
    incentives: R(results[16]), incentiveDetails: R(results[17]),
    bonuses: R(results[18]), bonusDetails: R(results[19]),
    salaryRevs: R(results[20]), salaryRevItems: R(results[21]),
  };
  buildDBFromRows(T);
}

function buildDBFromRows(T) {
  const num = (v, d = 0) => (v === null || v === undefined || v === '') ? d : Number(v);

  // ---- 社員 ----
  const salById = {};
  T.salaries.forEach(s => { salById[s.emp_id] = s; });
  _EMP.idByCode = {}; _EMP.idByName = {}; _EMP.byId = {}; _EMP.byCode = {};
  DB.members = T.employees
    .slice()
    .sort((a, b) => String(a.emp_code || '99').localeCompare(String(b.emp_code || '99'), 'ja', { numeric: true }))
    .map(e => {
      const s = salById[e.id] || {};
      const m = {
        code: e.emp_code, name: e.name, kana: e.kana || '', role: e.role,
        dept: e.dept || '', team: e.team || '', pos: e.pos || '', join: e.join_date || '',
        base: num(s.base), posAllow: num(s.pos_allow), jobAllow: num(s.job_allow),
        fixedOT: num(s.fixed_ot), commute: num(s.commute),
        status: e.status, eval: e.eval_type, ev1: e.ev1_code, evFinal: e.ev_final_code,
        isNaikan: !!e.is_naikan, _id: e.id, _authId: e.auth_user_id,
      };
      _EMP.byId[e.id] = m;
      if (e.emp_code) { _EMP.idByCode[e.emp_code] = e.id; _EMP.byCode[e.emp_code] = m; }
      _EMP.idByName[e.name] = e.id;
      return m;
    });

  // ---- マスタ ----
  DB.depts = T.departments.slice().sort((a, b) => a.sort_no - b.sort_no).map(d => d.name);
  DB.teams = {};
  T.teams.slice().sort((a, b) => a.sort_no - b.sort_no).forEach(t => {
    (DB.teams[t.dept_name] = DB.teams[t.dept_name] || []).push(t.name);
  });
  DB.positions = T.positions.slice().sort((a, b) => a.sort_no - b.sort_no).map(p => p.name);
  DB.compLib = T.complib.slice().sort((a, b) => {
    const [ca, na] = String(a.id).split('-'), [cb, nb] = String(b.id).split('-');
    return ca === cb ? (parseInt(na) - parseInt(nb)) : ca.localeCompare(cb);
  }).map(c => ({ id: c.id, cat: c.cat, name: c.name, desc: c.descr || '', reverse: c.reverse || '' }));

  // ---- パラメータ ----
  if (T.settings.length) {
    const st = T.settings[0];
    if (st.fixed_ot) DB.fixedOTSettings = st.fixed_ot;
    if (st.params) DB.params = st.params;
    if (st.bright_ranks) DB.brightRanks = st.bright_ranks;
    if (st.bright_dist) DB.brightDist = st.bright_dist;
  }

  // ---- 期・四半期・KGI ----
  const termMap = {};
  T.terms.forEach(t => { (termMap[t.period_id] = termMap[t.period_id] || {})[t.term] = t; });
  DB.periods = T.periods.slice()
    .sort((a, b) => (parseInt(String(b.id).slice(1)) || 0) - (parseInt(String(a.id).slice(1)) || 0))
    .map(p => {
      const qs = {};
      ['Q1', 'Q2', 'Q3', 'Q4'].forEach(q => {
        const t = termMap[p.id]?.[q];
        qs[q] = t ? { label: t.label || q, payDate: t.pay_date || '', status: t.status } : { label: q, payDate: '', status: 'future' };
      });
      return { id: p.id, label: p.label, year: p.year_label || '', qs };
    });
  DB.kgiData = {};
  T.terms.forEach(t => {
    DB.kgiData[t.period_id] = DB.kgiData[t.period_id] || {};
    DB.kgiData[t.period_id][t.term] = {
      kgi: num(t.kgi), gross: num(t.gross),
      kgiLocked: !!t.kgi_confirmed, grossLocked: !!t.gross_confirmed,
      _sheetsIssued: !!t.sheets_issued, _evalStarted: !!t.eval_started,
    };
  });
  const cur = T.periods.find(p => p.is_current) || T.periods.slice().sort((a, b) => (parseInt(String(b.id).slice(1)) || 0) - (parseInt(String(a.id).slice(1)) || 0))[0];
  DB.currentPeriod = cur ? cur.id : (DB.periods[0]?.id || '');
  let curQ = 'Q1';
  if (cur) {
    const qs = termMap[cur.id] || {};
    const active = ['Q1', 'Q2', 'Q3', 'Q4'].find(q => qs[q]?.status === 'active');
    if (active) curQ = active;
    else { const conf = ['Q1', 'Q2', 'Q3', 'Q4'].filter(q => qs[q]?.status === 'confirmed'); if (conf.length) curQ = conf[conf.length - 1]; }
  }
  DB.currentQ = curQ;

  // ---- 評価シート ----
  DB.sheets = {};
  const sheetById = {};
  T.sheets.forEach(sh => {
    DB.sheets[sh.emp_code] = DB.sheets[sh.emp_code] || {};
    DB.sheets[sh.emp_code][sh.period_id] = DB.sheets[sh.emp_code][sh.period_id] || {};
    const o = {
      status: sh.status, compWeight: sh.comp_weight, kpiWeight: sh.kpi_weight,
      locked: !!sh.locked, compItems: [], kpiItems: [], _sheetId: sh.id,
    };
    DB.sheets[sh.emp_code][sh.period_id][sh.q] = o;
    sheetById[sh.id] = o;
  });
  T.compItems.slice().sort((a, b) => a.sort_no - b.sort_no).forEach(it => {
    const sh = sheetById[it.sheet_id]; if (!sh) return;
    sh.compItems.push({
      id: it.comp_id, name: it.name, desc: it.descr || '', goal: it.goal || '',
      weight: num(it.weight), selfScore: it.self_score, ev1Score: it.ev1_score, finalScore: it.final_score,
      selfComment: it.self_comment || '', finalComment: it.final_comment || '', locked: !!it.locked, _id: it.id,
    });
  });
  T.kpiItems.slice().sort((a, b) => a.sort_no - b.sort_no).forEach(it => {
    const sh = sheetById[it.sheet_id]; if (!sh) return;
    sh.kpiItems.push({
      name: it.name, goal: it.goal || '', weight: num(it.weight),
      selfRate: it.self_rate, ev1Score: it.ev1_score, finalScore: it.final_score, locked: !!it.locked, _id: it.id,
    });
  });

  // ---- ブライトline ----
  DB.brightLineData = {};
  const blCell = (pid, q) => {
    DB.brightLineData[pid] = DB.brightLineData[pid] || {};
    if (!DB.brightLineData[pid][q]) DB.brightLineData[pid][q] = { ev1: {}, ev2: {}, confirmed: {}, adminConfirmed: false, _ev1Approved: {} };
    return DB.brightLineData[pid][q];
  };
  T.periods.forEach(p => ['Q1', 'Q2', 'Q3', 'Q4'].forEach(q => blCell(p.id, q)));
  T.blInputs.forEach(r => {
    const c = blCell(r.period_id, r.q);
    (c.ev1[r.evaluator_code] = c.ev1[r.evaluator_code] || {})[r.member_code] = r.rank;
  });
  T.blConfirmed.forEach(r => { blCell(r.period_id, r.q).confirmed[r.member_code] = r.rank; });
  T.blStatus.forEach(r => { blCell(r.period_id, r.q).adminConfirmed = !!r.admin_confirmed; });
  T.blApprovals.forEach(r => { blCell(r.period_id, r.q)._ev1Approved[r.evaluator_code] = true; });

  // ---- インセンティブ ----
  DB.incentiveHistory = {}; DB.incentiveAdjust = {}; DB.incentiveAdminConfirmed = {};
  T.periods.forEach(p => {
    DB.incentiveHistory[p.id] = {}; DB.incentiveAdjust[p.id] = {}; DB.incentiveAdminConfirmed[p.id] = {};
    ['Q1', 'Q2', 'Q3', 'Q4'].forEach(q => {
      DB.incentiveHistory[p.id][q] = { pool: 0, confirmed: false, payStatus: 'future', total: 0, dist: {}, brightMap: {} };
      DB.incentiveAdjust[p.id][q] = {}; DB.incentiveAdminConfirmed[p.id][q] = false;
    });
  });
  T.incentives.forEach(r => {
    const h = (DB.incentiveHistory[r.period_id] = DB.incentiveHistory[r.period_id] || {});
    h[r.q] = Object.assign(h[r.q] || { dist: {}, brightMap: {} }, {
      pool: num(r.pool), confirmed: !!r.confirmed, payStatus: r.pay_status, total: num(r.total),
      dist: (h[r.q] && h[r.q].dist) || {}, brightMap: (h[r.q] && h[r.q].brightMap) || {},
    });
    DB.incentiveAdminConfirmed[r.period_id] = DB.incentiveAdminConfirmed[r.period_id] || {};
    DB.incentiveAdminConfirmed[r.period_id][r.q] = !!r.confirmed;
  });
  T.incentiveDetails.forEach(r => {
    const h = DB.incentiveHistory[r.period_id]?.[r.q]; if (!h) return;
    h.dist[r.member_code] = num(r.amount);
    if (r.bright) h.brightMap[r.member_code] = r.bright;
    DB.incentiveAdjust[r.period_id] = DB.incentiveAdjust[r.period_id] || {};
    DB.incentiveAdjust[r.period_id][r.q] = DB.incentiveAdjust[r.period_id][r.q] || {};
    DB.incentiveAdjust[r.period_id][r.q][r.member_code] = num(r.adjust);
  });
  // BL確定済みなのにインセン明細が未確定の場合は、確定BLをbrightMapへ補完（表示用）
  Object.keys(DB.brightLineData).forEach(pid => {
    Object.keys(DB.brightLineData[pid]).forEach(q => {
      const bl = DB.brightLineData[pid][q];
      const h = DB.incentiveHistory[pid]?.[q];
      if (bl.adminConfirmed && h && !Object.keys(h.brightMap).length) h.brightMap = { ...bl.confirmed };
    });
  });

  // ---- 賞与 ----
  DB.bonusHistory = {}; DB.bonusAdjust = {};
  T.periods.forEach(p => {
    DB.bonusHistory[p.id] = {}; DB.bonusAdjust[p.id] = {};
    ['H1', 'H2'].forEach(h => {
      DB.bonusHistory[p.id][h] = { kgiRate: null, zone: null, confirmed: false, payDate: '', baseAmts: {}, upPool: 0, upDist: {}, upBright: {}, naikanAmts: {} };
      DB.bonusAdjust[p.id][h] = { baseAdj: {}, naikanAdj: {} };
    });
  });
  T.bonuses.forEach(r => {
    DB.bonusHistory[r.period_id] = DB.bonusHistory[r.period_id] || {};
    const prev = DB.bonusHistory[r.period_id][r.half] || { baseAmts: {}, upDist: {}, upBright: {}, naikanAmts: {} };
    DB.bonusHistory[r.period_id][r.half] = Object.assign(prev, {
      kgiRate: r.kgi_rate === null ? null : num(r.kgi_rate), zone: r.zone,
      confirmed: !!r.confirmed, payDate: r.pay_date || '', upPool: num(r.up_pool),
    });
  });
  T.bonusDetails.forEach(r => {
    const h = DB.bonusHistory[r.period_id]?.[r.half]; if (!h) return;
    const emp = _EMP.byId[r.emp_id]; if (!emp) return;
    DB.bonusAdjust[r.period_id] = DB.bonusAdjust[r.period_id] || {};
    DB.bonusAdjust[r.period_id][r.half] = DB.bonusAdjust[r.period_id][r.half] || { baseAdj: {}, naikanAdj: {} };
    if (emp.isNaikan) {
      h.naikanAmts[emp.name] = num(r.base_amt);
      DB.bonusAdjust[r.period_id][r.half].naikanAdj[emp.name] = num(r.base_adj);
    } else {
      h.baseAmts[emp.code] = num(r.base_amt);
      h.upDist[emp.code] = num(r.up_amt);
      if (r.up_bright) h.upBright[emp.code] = r.up_bright;
      DB.bonusAdjust[r.period_id][r.half].baseAdj[emp.code] = num(r.base_adj);
    }
  });

  // ---- 給与改定 ----
  DB.salaryHistory = {};
  T.salaryRevs.forEach(r => {
    DB.salaryHistory[r.period_id] = {
      confirmed: !!r.confirmed, adjApproved: !!r.adj_approved, finalApproved: !!r.final_approved,
      items: {}, naikanItems: {},
    };
  });
  T.salaryRevItems.forEach(r => {
    const sal = DB.salaryHistory[r.period_id]; if (!sal) return;
    const emp = _EMP.byId[r.emp_id]; if (!emp) return;
    const pitchUnit = (emp.pos === 'リーダー') ? (DB.params.pitchLeader || 1500) : (DB.params.pitchGeneral || 1000);
    const it = {
      annualAvg: r.annual_avg === null ? null : num(r.annual_avg), rank: r.rank,
      pitch: num(r.pitch), pitchAmt: num(r.pitch) * pitchUnit,
      adjPitch: num(r.adj_pitch), adjAmt: num(r.adj_pitch) * pitchUnit,
      baseBefore: num(r.base_before), baseAfter: num(r.base_after),
      fixedOTBefore: num(r.fixed_ot_before), jobAllowBefore: num(r.job_allow_before),
      posAllow: num(r.pos_allow), commute: num(r.commute),
    };
    if (emp.isNaikan) sal.naikanItems[emp.name] = it; else sal.items[emp.code] = it;
  });
}

function showLoginErr(msg) {
  const e = document.getElementById('login-err');
  if (e) { e.textContent = msg; e.style.display = msg ? 'block' : 'none'; }
}
function enterApp(m) {
  CU = m; evalMember = null;
  selPid = DB.currentPeriod || selPid; selQ = DB.currentQ || selQ; selHalf = 'H1';
  evalPid = selPid; evalQ = selQ;
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sb-avatar').textContent = m.name[0];
  document.getElementById('sb-name').textContent = m.name;
  document.getElementById('sb-role').textContent = ROLE_LABELS[m.role] || m.role;
  const p = DB.periods.find(x => x.id === selPid);
  const tp = document.getElementById('tb-period'); if (tp) tp.textContent = p ? p.label : '';

async function login() {
  const email = (document.getElementById('login-email')?.value || '').trim();
  const pass = document.getElementById('login-pass')?.value || '';
  const btn = document.getElementById('login-btn');
  showLoginErr('');
  if (!email || !pass) { showLoginErr('メールアドレスとパスワードを入力してください。'); return; }
  if (btn) { btn.disabled = true; btn.textContent = 'ログイン中…'; }
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

async function submitPassChange() {

// ---- 評価シート：親＋明細をまるごと保存 ----
async function syncSheet(code, q) {
  const sheet = DB.sheets[code]?.[evalPid]?.[q]; if (!sheet) return;
  const up = await sb.from('evaluation_sheets')
    .update({ status: sheet.status, comp_weight: sheet.compWeight, kpi_weight: sheet.kpiWeight, locked: !!sheet.locked })
    .eq('emp_code', code).eq('period_id', evalPid).eq('q', q).select('id');
  if (up.error) { sbFail('評価シート', up.error); return; }
  let sid = up.data?.[0]?.id;
  if (!sid) {
    // シート未登録（管理者操作時のみ発生しうる）→新規作成
    const ins = await sb.from('evaluation_sheets')
      .insert({ emp_code: code, period_id: evalPid, q, status: sheet.status, comp_weight: sheet.compWeight, kpi_weight: sheet.kpiWeight, locked: !!sheet.locked })
      .select('id');
    if (ins.error) { sbFail('評価シート作成', ins.error); return; }
    sid = ins.data?.[0]?.id;
  }
  if (!sid) return;
  sheet._sheetId = sid;
  const d1 = await sb.from('sheet_comp_items').delete().eq('sheet_id', sid);
  if (d1.error) { sbFail('評価シート明細', d1.error); return; }
  if (sheet.compItems.length) {
    const i1 = await sb.from('sheet_comp_items').insert(sheet.compItems.map((it, i) => ({
      sheet_id: sid, sort_no: i, comp_id: it.id || null, name: it.name || '', descr: it.desc || null,
      goal: it.goal || null, weight: it.weight || 0,
      self_score: it.selfScore ?? null, ev1_score: it.ev1Score ?? null, final_score: it.finalScore ?? null,
      self_comment: it.selfComment || '', final_comment: it.finalComment || '', locked: !!it.locked,
    })));
    if (i1.error) { sbFail('評価シート明細', i1.error); return; }
  }
  const d2 = await sb.from('sheet_kpi_items').delete().eq('sheet_id', sid);
  if (d2.error) { sbFail('KPI明細', d2.error); return; }
  if (sheet.kpiItems.length) {
    const i2 = await sb.from('sheet_kpi_items').insert(sheet.kpiItems.map((it, i) => ({
      sheet_id: sid, sort_no: i, name: it.name || '', goal: it.goal || null, weight: it.weight || 0,
      self_rate: it.selfRate ?? null, ev1_score: it.ev1Score ?? null, final_score: it.finalScore ?? null, locked: !!it.locked,
    })));
    if (i2.error) { sbFail('KPI明細', i2.error); return; }
  }
}

    const before = new Set(DB.periods.map(p => p.id));
    const r = o();
    const created = DB.periods.find(p => !before.has(p.id));
    if (created) {
      (async () => {
        const pid = created.id;
        const ok = await sbRun('期の作成', sb.from('periods').insert({ id: pid, label: created.label, year_label: created.year || null, is_current: false }));
        if (!ok) return;
        const terms = ['Q1', 'Q2', 'Q3', 'Q4'].map(q => ({ period_id: pid, term: q, label: created.qs[q]?.label || q, pay_date: null, status: 'future', kgi: 0, gross: 0 }))
          .concat(['H1', 'H2'].map(h => ({ period_id: pid, term: h, label: null, pay_date: null, status: 'future', kgi: 0, gross: 0 })));
        await sbRun('期の作成', sb.from('period_terms').insert(terms));
        await sbRun('期の作成', sb.from('brightline_status').insert(['Q1', 'Q2', 'Q3', 'Q4'].map(q => ({ period_id: pid, q, admin_confirmed: false }))));
        await sbRun('期の作成', sb.from('incentives').insert(['Q1', 'Q2', 'Q3', 'Q4'].map(q => ({ period_id: pid, q, pool: 0, confirmed: false, pay_status: 'future', total: 0 }))));
        await sbRun('期の作成', sb.from('bonuses').insert(['H1', 'H2'].map(h => ({ period_id: pid, half: h, confirmed: false, up_pool: 0 }))));
        await sbRun('期の作成', sb.from('salary_revisions').insert({ period_id: pid, confirmed: false, adj_approved: false, final_approved: false }));
      })();
    }
    return r;
  };
}
{
  const o = window.issueSheets;
  window.issueSheets = function (pid, q) {
    const r = o(pid, q);
    const p = DB.periods.find(x => x.id === pid);
    if (p && p.qs[q]?.status === 'goal') {
      (async () => {
        const rows = DB.members.filter(m => !m.isNaikan && m.eval !== '除外').map(m => {
          const sh = DB.sheets[m.code]?.[pid]?.[q] || {};
          return { emp_code: m.code, period_id: pid, q, status: sh.status || 'goal_setting', comp_weight: sh.compWeight || 40, kpi_weight: sh.kpiWeight || 60, locked: false };
        });
        if (rows.length) await sbRun('シート発行', sb.from('evaluation_sheets').upsert(rows, { onConflict: 'emp_code,period_id,q', ignoreDuplicates: true }));
        await sbRun('シート発行', sb.from('period_terms').update({ status: 'goal', sheets_issued: true }).eq('period_id', pid).eq('term', q));
      })();
    }
    return r;
  };
}
{
  const o = window.startEval;
  window.startEval = function (pid, q) {
    const r = o(pid, q);
    const p = DB.periods.find(x => x.id === pid);
    if (p && p.qs[q]?.status === 'active') {
      (async () => {
        await sbRun('評価開始', sb.from('period_terms').update({ status: 'active', eval_started: true }).eq('period_id', pid).eq('term', q));
        await sbRun('評価開始', sb.from('evaluation_sheets').update({ status: 'self_eval' }).eq('period_id', pid).eq('q', q).in('status', ['goal_setting', 'goal_wait', 'goal_locked']));
      })();
    }
    return r;
  };
}

// ---- パラメータ設定 ----
async function syncSettings() {
  await sbRun('パラメータ設定', sb.from('app_settings').update({
    fixed_ot: DB.fixedOTSettings, params: DB.params,
    bright_ranks: DB.brightRanks, bright_dist: DB.brightDist,
  }).eq('id', 1));
}
{
  const o = window.updateRankCount;
  window.updateRankCount = function () { const r = o(); syncSettings(); return r; };
}

</script>
